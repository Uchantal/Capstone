server {
    listen 80;
    server_name dcip-rw.online www.dcip-rw.online;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name dcip-rw.online www.dcip-rw.online;

    # SSL certificates managed by Certbot — do not edit these paths
    ssl_certificate     /etc/letsencrypt/live/dcip-rw.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dcip-rw.online/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Max upload size — matches Express json limit
    client_max_body_size 10m;

    # ── Charset ──────────────────────────────────────────────────────────────
    # Fixes Lighthouse "Properly defines charset" Best Practices error
    charset utf-8;

    # ── Security headers ─────────────────────────────────────────────────────
    # HSTS: tell browsers to always use HTTPS for 1 year
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Prevent the page from being embedded in iframes on other sites
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Stop browsers from guessing content types (fixes MIME sniffing)
    add_header X-Content-Type-Options "nosniff" always;

    # Control referrer information sent to other sites
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy — restricts what resources the page can load
    # script-src 'self': only scripts from this domain
    # style-src 'self' 'unsafe-inline': Tailwind uses inline styles
    # img-src data: blob: https:: canvas exports (data:), Cloudinary (https:), object URLs (blob:)
    # media-src blob:: microphone recordings (Web Audio API)
    # worker-src blob:: Service Worker registration
    # connect-src 'self': all API calls are same-origin
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; media-src 'self' blob:; worker-src 'self' blob:;" always;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        application/manifest+json;
    gzip_min_length 1024;

    # ── API — proxy to Express backend ───────────────────────────────────────
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Frontend — serve React build ─────────────────────────────────────────
    location / {
        root /var/www/dcip;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets (JS/CSS with hashed names) for 1 year
        location ~* \.(js|css|woff2|woff|ttf|ico|png|jpg|jpeg|svg|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
